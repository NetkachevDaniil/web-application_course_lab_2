<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ЛР2 Flask{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">ЛР2</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{{ url_for('request_info') }}">Данные запроса</a>
            <a class="nav-link" href="{{ url_for('auth_form') }}">Авторизация (форма)</a>
            <a class="nav-link" href="{{ url_for('phone_check') }}">Проверка телефона</a>
            <a class="nav-link" href="{{ url_for('set_demo_cookie') }}">Установить cookie</a>
        </div>
    </div>
</nav>

<main class="container pb-5">
    {% block content %}{% endblock %}
</main>
</body>
</html>
