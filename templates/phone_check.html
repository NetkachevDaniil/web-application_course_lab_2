{% extends "base.html" %}
{% block title %}ЛР2 - Проверка телефона{% endblock %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h4">Проверка номера телефона</h1>
        <form method="post" class="mt-3">
            <div class="mb-3">
                <label for="phone" class="form-label">Номер телефона</label>
                <input
                    type="text"
                    id="phone"
                    name="phone"
                    value="{{ phone_value }}"
                    class="form-control {% if error_message %}is-invalid{% endif %}"
                    placeholder="+7 (123) 456-75-90"
                    required
                >
                {% if error_message %}
                    <div class="invalid-feedback">{{ error_message }}</div>
                {% endif %}
            </div>
            <button class="btn btn-primary">Проверить</button>
        </form>

        {% if formatted_phone %}
            <div class="alert alert-success mt-3 mb-0">
                Преобразованный номер: <strong>{{ formatted_phone }}</strong>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
